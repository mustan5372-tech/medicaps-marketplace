<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#030712" />
    <title>MediCaps Marketplace</title>
    <!-- Apply glass theme before React mounts to prevent flicker -->
    <script>
      try {
        const saved = JSON.parse(localStorage.getItem('theme') || '{}')
        const glass = saved.state?.glass !== false  // default true if not explicitly set to false
        if (glass) document.documentElement.setAttribute('data-glass', 'true')
        if (saved.state?.dark) document.documentElement.classList.add('dark')
      } catch(e) {
        document.documentElement.setAttribute('data-glass', 'true')
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PZEEYPXVR5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PZEEYPXVR5');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
